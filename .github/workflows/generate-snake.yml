name: Generate Snake

on:
  # Berjalan otomatis setiap 12 jam
  schedule:
    - cron: "0 */12 * * *"
  
  # Berjalan otomatis setiap kali kamu push/commit ke main branch
  push:
    branches:
      - main
      - master
  
  # Memungkinkan kamu menjalankan manual dari tab Actions
  workflow_dispatch:

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # Membuat animasi ular berdasarkan kontribusi user
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # Menaruh hasilnya ke branch bernama 'output' agar bisa di-load di README
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
